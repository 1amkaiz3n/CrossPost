{% extends "base.html" %}
{% block page_title %}Upload History{% endblock %}
{% block content %}
<div class="space-y-6">
    <div class="flex items-center justify-between gap-4 flex-wrap">
        <div class="relative flex-1 min-w-[280px] max-w-md">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </span>
            <input type="text" id="search-history" oninput="filterHistory()" placeholder="Cari berdasarkan judul atau file..." class="w-full pl-10 pr-4 py-2.5 rounded-xl bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all text-sm">
        </div>
    </div>

    <div id="history-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
        <div class="col-span-full text-center py-12 text-gray-500">Memuat data...</div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let allUploads = [];

const platformColors = {
    youtube: 'red', facebook: 'blue', instagram: 'pink', linkedin: 'blue-700', threads: 'gray'
};
const platformIcons = {
    youtube: 'fa-youtube', facebook: 'fa-facebook', instagram: 'fa-instagram', linkedin: 'fa-linkedin', threads: 'fa-threads'
};

async function loadHistory() {
    try {
        allUploads = await fetch('/api/upload').then(r => r.json());
        renderHistory(allUploads);
    } catch (e) {
        showToast('Gagal memuat riwayat', 'error');
    }
}

function renderHistory(uploads) {
    const grid = document.getElementById('history-grid');

    if (uploads.length === 0) {
        grid.innerHTML = '<div class="col-span-full text-center py-12 text-gray-500">Belum ada riwayat upload</div>';
        return;
    }

    grid.innerHTML = uploads.map(u => {
        let statusBadgeClass = '';
        let statusText = '';
        if (u.status === 'completed') {
            statusBadgeClass = 'bg-green-500/10 text-green-700 dark:text-green-400 border border-green-500/20';
            statusText = 'Completed';
        } else if (u.status === 'partial') {
            statusBadgeClass = 'bg-yellow-500/10 text-yellow-700 dark:text-yellow-400 border border-yellow-500/20';
            statusText = 'Partial';
        } else {
            statusBadgeClass = 'bg-gray-500/10 text-gray-700 dark:text-gray-400 border border-gray-500/20';
            statusText = u.status || 'Pending';
        }

        const dateStr = new Date(u.created_at).toLocaleDateString('id-ID', {
            year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
        });

        const platformBadges = (u.platforms || []).map(p => {
            const statusObj = (u.statuses || {})[p] || {};
            let color = 'gray';
            if (statusObj.status === 'success') color = 'green';
            else if (statusObj.status === 'error') color = 'red';
            else if (statusObj.status === 'uploading') color = 'blue';

            const icon = platformIcons[p] || 'fa-circle';
            const label = p.charAt(0).toUpperCase() + p.slice(1);

            return `<span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-xs font-medium border border-${color}-500/20 bg-${color}-500/5 text-${color}-600 dark:text-${color}-400">
                <i class="fa-brands ${icon}"></i>
                ${label}
            </span>`;
        }).join(' ');

        const errorText = Object.entries(u.statuses || {})
            .filter(([_, s]) => s.error)
            .map(([p, s]) => `${p.toUpperCase()}: ${s.error}`)
            .join('; ');

        return `<div class="glass rounded-2xl overflow-hidden p-5 flex flex-col justify-between space-y-4">
            <div class="space-y-2">
                <div class="flex items-center justify-between gap-2 flex-wrap">
                    <span class="text-xs text-gray-500">${dateStr}</span>
                    <span class="px-2.5 py-0.5 rounded-full text-xs font-semibold ${statusBadgeClass}">${statusText}</span>
                </div>
                <div>
                    <h3 class="font-semibold text-base line-clamp-2" title="${escapeHtml(u.title || u.filename)}">${escapeHtml(u.title || u.filename)}</h3>
                    <p class="text-xs text-gray-400 mt-1 truncate">File: ${escapeHtml(u.filename)}</p>
                </div>
                <div class="flex flex-wrap gap-1.5 pt-1">
                    ${platformBadges}
                </div>
                ${errorText ? `<div class="p-2.5 rounded-xl bg-red-500/5 border border-red-500/10 text-xs text-red-500 dark:text-red-400 mt-2 max-h-24 overflow-y-auto">${escapeHtml(errorText)}</div>` : ''}
            </div>
            <div class="flex items-center justify-between pt-4 border-t border-gray-100 dark:border-gray-800 mt-auto">
                <span class="text-xs text-gray-500">${formatSize(u.file_size)}</span>
                <button onclick="deleteUpload('${u.id}')" class="text-xs px-3 py-1.5 rounded-lg bg-red-500/10 text-red-600 dark:text-red-400 hover:bg-red-500/20 transition-colors font-medium">Delete</button>
            </div>
        </div>`;
    }).join('');
}

function filterHistory() {
    const q = document.getElementById('search-history').value.toLowerCase().trim();
    if (!q) {
        renderHistory(allUploads);
        return;
    }
    const filtered = allUploads.filter(u => {
        const title = (u.title || '').toLowerCase();
        const filename = (u.filename || '').toLowerCase();
        return title.includes(q) || filename.includes(q);
    });
    renderHistory(filtered);
}

function formatSize(bytes) {
    if (!bytes) return '0 B';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
    return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function deleteUpload(id) {
    showModal('Hapus Upload', 'Yakin ingin menghapus upload ini dari riwayat?', async () => {
        try {
            const resp = await fetch(`/api/upload/${id}`, { method: 'DELETE' });
            const data = await resp.json();
            if (data.success) {
                showToast('Upload berhasil dihapus', 'success');
                loadHistory();
            }
        } catch (e) {
            showToast('Gagal menghapus upload', 'error');
        }
    });
}

loadHistory();
</script>
{% endblock %}
